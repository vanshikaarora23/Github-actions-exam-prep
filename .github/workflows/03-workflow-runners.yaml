name: 03 - Workflow Runners
on: push

jobs:
    ubuntu-echo:
        runs-on: ubuntu-latest
        steps:
            - name: Show OS
              run: |
                "This job is running on an $RUNNER_OS runner."



    windows-echo:
        runs-on: windows-latest
        steps:
            - name: Show OS
              run: |
                echo "This job is running on a Windows runner."
                The runner is running on: $RUNNER_OS

    mac-echo:
        runs-on: macos-latest
        steps:  
            - name: Show OS
              run: |
                echo "This job is running on a MacOS runner."   
                $RUNNER_OS
                exit 1




                
                


    